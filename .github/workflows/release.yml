name: Release

# Triggered when a version tag is pushed: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Build cross-platform release binaries ─────────────────────────────────────
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (static musl — no libc dependency)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: binsleuth-x86_64-linux
            binary: binsleuth
            install_musl: true

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: binsleuth-x86_64-macos
            binary: binsleuth
            install_musl: false

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: binsleuth-aarch64-macos
            binary: binsleuth
            install_musl: false

          # Windows x86-64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: binsleuth-x86_64-windows
            binary: binsleuth.exe
            install_musl: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl tools (Linux static build)
        if: matrix.install_musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary for upload (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
             ${{ matrix.artifact }}

      - name: Rename binary for upload (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" `
                    "${{ matrix.artifact }}.exe"

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.exe
          retention-days: 1

  # ── Create GitHub Release ────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BinSleuth ${{ github.ref_name }}
          body: |
            ## BinSleuth ${{ github.ref_name }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux (static) | x86-64 | `binsleuth-x86_64-linux` |
            | macOS | x86-64 | `binsleuth-x86_64-macos` |
            | macOS | Apple Silicon (M1/M2) | `binsleuth-aarch64-macos` |
            | Windows | x86-64 | `binsleuth-x86_64-windows.exe` |

            ### Install via cargo
            ```
            cargo install binsleuth@${{ github.ref_name }}
            ```
          generate_release_notes: true
          files: |
            artifacts/**/*

  # ── Publish to crates.io ────────────────────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish
        # Requires CARGO_REGISTRY_TOKEN secret set in repository settings.
        # Get your token at: https://crates.io/settings/tokens
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
